<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>News &amp; Events</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <!-- ── PAGE HEADER ─────────────────────────────────────────────────── -->
  <section class="page-header">
    <div class="page-header-inner">
      <div class="header-rule"></div>
      <ion-text>
        <h1>News &amp; Events</h1>
        <p>Stay up to date with the latest from our foundation.</p>
      </ion-text>
    </div>
  </section>

  <!-- ── NEWS GRID ──────────────────────────────────────────────────── -->
  <ion-grid class="news-grid">
    <ion-row>

      <ion-col size="12" size-md="6" size-lg="4" *ngFor="let article of allArticles | slice:0:5">
        <ion-card class="news-card">
          <div class="card-img-wrapper">
            <img
              src="{{article.imageUrl}}"
              alt="{{article.imageAltText}}"
              class="card-img"
              onerror="this.closest('.card-img-wrapper').classList.add('img-error')"
            />
            <div class="card-img-fallback" aria-hidden="true">
              <ion-icon name="image-outline"></ion-icon>
              <span>No image available</span>
            </div>
          </div>
          <ion-card-header>
            <ion-card-subtitle>
              <ion-icon name="calendar-outline" aria-hidden="true"></ion-icon>
              {{article.date}}
            </ion-card-subtitle>
            <ion-card-title>{{article.title}}</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <ion-button expand="block" (click)="goToArticle(article.slug)">
              Read More
              <ion-icon slot="end" name="arrow-forward-outline" aria-hidden="true"></ion-icon>
            </ion-button>
          </ion-card-content>
        </ion-card>
      </ion-col>

    </ion-row>
  </ion-grid>

</ion-content>
