<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>News &amp; Events</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <!-- ── PAGE HEADER ─────────────────────────────────────────────────── -->
  <section class="page-header">
    <div class="page-header-inner">
      <div class="header-rule"></div>
      <ion-text>
        <h1>News &amp; Events</h1>
        <p>Stay up to date with the latest from our foundation.</p>
      </ion-text>
    </div>
  </section>

  <!-- ── NEWS GRID ──────────────────────────────────────────────────── -->
  <ion-grid class="news-grid">
    <ion-row>
      <ion-col size="12" size-md="6" size-lg="4">
        <ion-card class="news-card" *ngFor="let article of allArticles[0:5]">
          <img
            src="https://placehold.co/600x400/F7F4FF/713AAF"
            alt="Community members receiving grant funds at a foundation ceremony"
            class="card-img"
          />
          <ion-card-header>
            <ion-card-subtitle>
              <ion-icon name="calendar-outline" aria-hidden="true"></ion-icon>
              March 5, 2025
            </ion-card-subtitle>
            <ion-card-title>Foundation Launches New Community Grant Program</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <ion-button expand="block" href="#" (click) = "navigate('/news-article')">
              Read More
              <ion-icon slot="end" name="arrow-forward-outline" aria-hidden="true"></ion-icon>
            </ion-button>
          </ion-card-content>
        </ion-card>
