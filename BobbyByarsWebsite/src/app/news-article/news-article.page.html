<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>news-article</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ng-container *ngIf="article; else notFound">
    <p>{{ article.title }}</p>
    <p>Slug: {{ article.slug }}</p>
  </ng-container>

  <ng-template #notFound>
    <p>Article not found.</p>
  </ng-template>
</ion-content>
